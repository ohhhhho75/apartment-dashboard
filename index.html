<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse (CSV Parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Google Fonts (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom Scrollbar for Table */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="bg-white rounded-2xl shadow-sm p-6 flex items-center justify-between">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-900">🏢 우리 동네 아파트 실거래가 대시보드</h1>
                <p class="text-gray-500 mt-2 text-sm md:text-base">최근 거래 데이터를 기반으로 한 분석 결과입니다.</p>
            </div>
            <div id="loading" class="flex items-center text-blue-600 font-medium">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                데이터 불러오는 중...
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="summary-cards" style="display: none;">
            <!-- 총 거래 건수 -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-blue-500">
                <p class="text-sm font-medium text-gray-500">전체 거래 건수</p>
                <p class="text-3xl font-bold text-gray-900 mt-2"><span id="total-count">0</span><span class="text-lg font-normal text-gray-600 ml-1">건</span></p>
            </div>
            <!-- 평균 거래 가격 -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-green-500">
                <p class="text-sm font-medium text-gray-500">평균 거래 가격</p>
                <p class="text-3xl font-bold text-gray-900 mt-2"><span id="avg-price">0</span><span class="text-lg font-normal text-gray-600 ml-1">만원</span></p>
            </div>
            <!-- 최고 거래 가격 -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-red-500">
                <p class="text-sm font-medium text-gray-500">최고 거래 가격</p>
                <p class="text-3xl font-bold text-gray-900 mt-2"><span id="max-price">0</span><span class="text-lg font-normal text-gray-600 ml-1">만원</span></p>
            </div>
            <!-- 최저 거래 가격 -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-yellow-500">
                <p class="text-sm font-medium text-gray-500">최저 거래 가격</p>
                <p class="text-3xl font-bold text-gray-900 mt-2"><span id="min-price">0</span><span class="text-lg font-normal text-gray-600 ml-1">만원</span></p>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6" id="main-content" style="display: none;">
            
            <!-- Chart Section -->
            <div class="bg-white rounded-2xl shadow-sm p-6 lg:col-span-1 flex flex-col">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📈 월별 평균 거래가격</h2>
                <div class="relative flex-grow min-h-[300px]">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- Table Section -->
            <div class="bg-white rounded-2xl shadow-sm p-6 lg:col-span-2 flex flex-col">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📋 상세 거래 목록</h2>
                <div class="table-container overflow-x-auto overflow-y-auto max-h-[500px] rounded-lg border border-gray-200">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50 sticky top-0 z-10">
                            <tr>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">거래일자</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">법정동</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider min-w-[150px]">아파트명</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">전용면적(㎡)</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">층</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">거래금액(만원)</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">건축년도</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="bg-white divide-y divide-gray-200 text-sm">
                            <!-- Table rows will be inserted here dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // CSV 데이터 URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRJBcHcAbrHqcgK9B44XzvD_I02hPY-k-SOi4rNq9FA7K1CNBZ0wgvKVx8-iJRd9tvHOSAchy3SrUU/pub?gid=326190279&single=true&output=csv';

        // 숫자에 콤마 찍기 유틸리티
        const formatNumber = (num) => new Intl.NumberFormat('ko-KR').format(num);

        // 데이터 로드 및 초기화
        document.addEventListener('DOMContentLoaded', () => {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const rawData = results.data;
                    processData(rawData);
                },
                error: function(err) {
                    console.error('CSV Parsing Error:', err);
                    document.getElementById('loading').innerHTML = '<span class="text-red-500">데이터를 불러오는데 실패했습니다.</span>';
                }
            });
        });

        function processData(data) {
            // 유효한 데이터 필터링 및 데이터 타입 변환
            const cleanData = data.map(row => {
                // 키(Key) 매핑 - CSV 헤더의 공백이나 특수문자 대응을 위해 일부 유연하게 처리
                const getVal = (keyPart) => {
                    const key = Object.keys(row).find(k => k.includes(keyPart));
                    return key ? row[key] : '';
                };

                const dateStr = getVal('거래일자').trim(); // ex) 2026-02-15
                const priceStr = getVal('거래금액').replace(/,/g, '').trim(); // 콤마 제거

                return {
                    date: dateStr,
                    month: dateStr.substring(0, 7), // YYYY-MM 추출
                    name: getVal('아파트명'),
                    dong: getVal('법정동'),
                    area: getVal('전용면적'),
                    floor: getVal('층'),
                    price: parseInt(priceStr, 10) || 0,
                    buildYear: getVal('건축년도')
                };
            }).filter(item => item.date && item.price > 0); // 날짜와 가격이 유효한 것만

            // 데이터 정렬 (최신 거래일자 순)
            cleanData.sort((a, b) => new Date(b.date) - new Date(a.date));

            // UI 렌더링
            renderSummary(cleanData);
            renderChart(cleanData);
            renderTable(cleanData);

            // 로딩 숨기고 컨텐츠 표시
            document.getElementById('loading').style.display = 'none';
            document.getElementById('summary-cards').style.display = 'grid';
            document.getElementById('main-content').style.display = 'grid';
        }

        // 1. 요약 카드 렌더링
        function renderSummary(data) {
            if (data.length === 0) return;

            const totalCount = data.length;
            const prices = data.map(item => item.price);
            
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);
            const avgPrice = Math.round(prices.reduce((a, b) => a + b, 0) / totalCount);

            // 억 단위 변환 보조 함수 (예: 150000 -> 15억)
            const formatPriceKor = (price) => {
                if (price >= 10000) {
                    const uk = Math.floor(price / 10000);
                    const man = price % 10000;
                    return man > 0 ? `${formatNumber(uk)}억 ${formatNumber(man)}` : `${formatNumber(uk)}억`;
                }
                return formatNumber(price);
            };

            document.getElementById('total-count').innerText = formatNumber(totalCount);
            // 만원 단위 대신 억 단위를 병기해서 보여주면 더 직관적입니다
            document.getElementById('avg-price').innerText = formatPriceKor(avgPrice);
            document.getElementById('max-price').innerText = formatPriceKor(maxPrice);
            document.getElementById('min-price').innerText = formatPriceKor(minPrice);
        }

        // 2. 월별 평균 차트 렌더링
        function renderChart(data) {
            // 월별 데이터 그룹화
            const monthlyData = {};
            data.forEach(item => {
                if (!monthlyData[item.month]) {
                    monthlyData[item.month] = { sum: 0, count: 0 };
                }
                monthlyData[item.month].sum += item.price;
                monthlyData[item.month].count += 1;
            });

            // 차트용 배열 생성 및 정렬 (과거 -> 최신)
            const months = Object.keys(monthlyData).sort();
            const avgPrices = months.map(month => 
                Math.round(monthlyData[month].sum / monthlyData[month].count)
            );

            // Chart.js 생성
            const ctx = document.getElementById('priceChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: '평균 거래금액 (만원)',
                        data: avgPrices,
                        borderColor: '#3b82f6', // Tailwind blue-500
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#3b82f6',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3 // 곡선 부드럽게
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return formatNumber(context.raw) + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return formatNumber(value);
                                }
                            }
                        }
                    }
                }
            });
        }

        // 3. 거래 목록 테이블 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // 기존 내용 초기화

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition-colors';
                
                tr.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap text-gray-600">${item.date}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-gray-600">${item.dong}</td>
                    <td class="px-4 py-3 text-gray-900 font-medium">${item.name}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right text-gray-600">${item.area}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right text-gray-600">${item.floor}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right font-semibold text-blue-600">${formatNumber(item.price)}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right text-gray-500">${item.buildYear}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
