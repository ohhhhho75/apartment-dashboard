<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        /* 요약 카드 스타일 */
        .summary-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin: 0; font-size: 0.9rem; color: #7f8c8d; }
        .card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        .card.highlight p { color: #3498db; }

        /* 차트 영역 */
        .chart-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; height: 400px; }

        /* 테이블 영역 */
        .table-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background-color: #fcfcfc; color: #7f8c8d; font-weight: 600; }
        tr:hover { background-color: #f1f7ff; }

        .loading { text-align: center; font-size: 1.2rem; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1>우리 동네 아파트 실거래가 대시보드</h1>

    <div id="summary" class="summary-container">
        <div class="card"><h3 id="stat-count-title">전체 거래 건수</h3><p id="total-count">-</p></div>
        <div class="card highlight"><h3>평균 거래가</h3><p id="avg-price">-</p></div>
        <div class="card"><h3>최고 거래가</h3><p id="max-price">-</p></div>
        <div class="card"><h3>최저 거래가</h3><p id="min-price">-</p></div>
    </div>

    <div class="chart-container">
        <canvas id="monthlyChart"></canvas>
    </div>

    <div class="table-container">
        <h3>최근 거래 목록</h3>
        <table id="raw-data-table">
            <thead>
                <tr>
                    <th>거래일자</th>
                    <th>법정동</th>
                    <th>아파트명</th>
                    <th>전용면적(㎡)</th>
                    <th>층</th>
                    <th>거래금액(만원)</th>
                    <th>건축년도</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. 여기에 구글 시트 CSV URL을 붙여넣으세요.
    const csvUrl = '여기에_CSV_URL을_입력하세요'; 

    function init() {
        if (csvUrl.includes('여기에')) {
            alert('CSV URL을 입력해주세요!');
            return;
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                processData(data);
            },
            error: function(err) {
                console.error("데이터 로드 실패:", err);
                alert("데이터를 불러오는 데 실패했습니다. URL을 확인하세요.");
            }
        });
    }

    function processData(data) {
        // 숫자 전처리 (콤마 제거 등)
        data.forEach(d => {
            d['거래금액(만원)'] = parseInt(String(d['거래금액(만원)']).replace(/,/g, '')) || 0;
            d['전용면적(㎡)'] = parseFloat(d['전용면적(㎡)']) || 0;
        });

        // 1. 요약 통계 계산
        const count = data.length;
        const prices = data.map(d => d['거래금액(만원)']).filter(p => p > 0);
        const avg = prices.reduce((a, b) => a + b, 0) / count;
        const max = Math.max(...prices);
        const min = Math.min(...prices);

        document.getElementById('total-count').innerText = count.toLocaleString() + ' 건';
        document.getElementById('avg-price').innerText = Math.round(avg).toLocaleString() + ' 만원';
        document.getElementById('max-price').innerText = max.toLocaleString() + ' 만원';
        document.getElementById('min-price').innerText = min.toLocaleString() + ' 만원';

        // 2. 월별 평균 가격 데이터 가공 (거래일자: YYYYMMDD 또는 YYYY-MM-DD 가정)
        const monthlyData = {};
        data.forEach(d => {
            const dateStr = String(d['거래일자']);
            const month = dateStr.substring(0, 4) + '-' + dateStr.substring(4, 6); // YYYY-MM
            if (!monthlyData[month]) monthlyData[month] = { sum: 0, count: 0 };
            monthlyData[month].sum += d['거래금액(만원)'];
            monthlyData[month].count += 1;
        });

        const labels = Object.keys(monthlyData).sort();
        const avgPrices = labels.map(m => Math.round(monthlyData[m].sum / monthlyData[m].count));

        renderChart(labels, avgPrices);

        // 3. 테이블 렌더링
        const tbody = document.querySelector('#raw-data-table tbody');
        data.slice(0, 50).forEach(d => { // 상위 50개만 표시
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${d['거래일자']}</td>
                <td>${d['법정동']}</td>
                <td>${d['아파트명']}</td>
                <td>${d['전용면적(㎡)']}</td>
                <td>${d['층']}</td>
                <td>${d['거래금액(만원)'].toLocaleString()}</td>
                <td>${d['건축년도']}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderChart(labels, values) {
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '월별 평균 거래가 (만원)',
                    data: values,
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    title: { display: true, text: '월별 거래가격 추이' }
                },
                scales: {
                    y: { beginAtZero: false, ticks: { callback: v => v.toLocaleString() + '만' } }
                }
            }
        });
    }

    window.onload = init;
</script>

</body>
</html>
