<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse (CSV Parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Google Fonts (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom Scrollbar for Table */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="bg-white rounded-2xl shadow-sm p-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- 무지개색 텍스트 그라데이션 적용 -->
                <h1 class="text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-yellow-400 to-purple-500">🏢 우리 동네 아파트 실거래가 대시보드</h1>
                <p class="text-gray-500 mt-2 text-sm md:text-base">최근 거래 데이터를 기반으로 한 분석 결과입니다.</p>
            </div>
            <div class="flex items-center gap-4">
                <!-- 법정동 필터 드롭다운 (초기엔 숨김) -->
                <div id="filter-container" style="display: none;" class="flex items-center">
                    <label for="dong-filter" class="text-sm font-medium text-gray-700 mr-2 whitespace-nowrap">동네 선택:</label>
                    <select id="dong-filter" class="border border-gray-300 rounded-lg py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50 cursor-pointer">
                        <option value="all">전체</option>
                    </select>
                </div>
                <div id="loading" class="flex items-center text-purple-600 font-medium">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-purple-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="whitespace-nowrap">데이터 불러오는 중...</span>
                </div>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="summary-cards" style="display: none;">
            <!-- 총 거래 건수 (빨강) -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-red-500">
                <p class="text-sm font-medium text-gray-500">전체 거래 건수</p>
                <p class="text-3xl font-bold text-red-500 mt-2"><span id="total-count">0</span><span class="text-lg font-normal text-red-400 ml-1">건</span></p>
            </div>
            <!-- 평균 거래 가격 (주황) -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-orange-500">
                <p class="text-sm font-medium text-gray-500">평균 거래 가격</p>
                <p class="text-3xl font-bold text-orange-500 mt-2"><span id="avg-price">0</span><span class="text-lg font-normal text-orange-400 ml-1">만원</span></p>
            </div>
            <!-- 최고 거래 가격 (초록) -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-green-500">
                <p class="text-sm font-medium text-gray-500">최고 거래 가격</p>
                <p class="text-3xl font-bold text-green-500 mt-2"><span id="max-price">0</span><span class="text-lg font-normal text-green-400 ml-1">만원</span></p>
            </div>
            <!-- 최저 거래 가격 (파랑) -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border-l-4 border-blue-500">
                <p class="text-sm font-medium text-gray-500">최저 거래 가격</p>
                <p class="text-3xl font-bold text-blue-500 mt-2"><span id="min-price">0</span><span class="text-lg font-normal text-blue-400 ml-1">만원</span></p>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6" id="main-content" style="display: none;">
            
            <!-- Chart Section -->
            <div class="bg-white rounded-2xl shadow-sm p-6 lg:col-span-1 flex flex-col">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📈 월별 평균 거래가격</h2>
                <div class="relative flex-grow min-h-[300px]">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- Table Section -->
            <div class="bg-white rounded-2xl shadow-sm p-6 lg:col-span-2 flex flex-col">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📋 상세 거래 목록</h2>
                <div class="table-container overflow-x-auto overflow-y-auto max-h-[500px] rounded-lg border border-gray-200">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50 sticky top-0 z-10">
                            <tr>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">거래일자</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">법정동</th>
                                <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider min-w-[150px]">아파트명</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">전용면적(㎡)</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">층</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">거래금액(만원)</th>
                                <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">건축년도</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="bg-white divide-y divide-gray-200 text-sm">
                            <!-- Table rows will be inserted here dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // CSV 데이터 URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRJBcHcAbrHqcgK9B44XzvD_I02hPY-k-SOi4rNq9FA7K1CNBZ0wgvKVx8-iJRd9tvHOSAchy3SrUU/pub?gid=326190279&single=true&output=csv';

        // 전역 변수 설정 (데이터 상태 관리 및 차트 인스턴스)
        let globalData = [];
        let priceChartInstance = null;

        // 숫자에 콤마 찍기 유틸리티
        const formatNumber = (num) => new Intl.NumberFormat('ko-KR').format(num);

        // 데이터 로드 및 초기화
        document.addEventListener('DOMContentLoaded', () => {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const rawData = results.data;
                    processData(rawData);
                },
                error: function(err) {
                    console.error('CSV Parsing Error:', err);
                    document.getElementById('loading').innerHTML = '<span class="text-red-500">데이터를 불러오는데 실패했습니다.</span>';
                }
            });
        });

        function processData(data) {
            // 유효한 데이터 필터링 및 데이터 타입 변환
            const cleanData = data.map(row => {
                // 키(Key) 매핑
                const getVal = (keyPart) => {
                    const key = Object.keys(row).find(k => k.includes(keyPart));
                    return key ? row[key] : '';
                };

                const dateStr = getVal('거래일자').trim();
                const priceStr = getVal('거래금액').replace(/,/g, '').trim();

                return {
                    date: dateStr,
                    month: dateStr.substring(0, 7),
                    name: getVal('아파트명'),
                    dong: getVal('법정동'),
                    area: getVal('전용면적'),
                    floor: getVal('층'),
                    price: parseInt(priceStr, 10) || 0,
                    buildYear: getVal('건축년도')
                };
            }).filter(item => item.date && item.price > 0);

            // 데이터 정렬
            cleanData.sort((a, b) => new Date(b.date) - new Date(a.date));

            // 전역 변수에 전체 데이터 저장
            globalData = cleanData;

            // 드롭다운 필터 초기화
            populateDongFilter(globalData);

            // UI 렌더링
            updateDashboard(globalData);

            // 로딩 숨기고 컨텐츠 표시
            document.getElementById('loading').style.display = 'none';
            document.getElementById('filter-container').style.display = 'flex';
            document.getElementById('summary-cards').style.display = 'grid';
            document.getElementById('main-content').style.display = 'grid';
        }

        // 동네(법정동) 필터 목록 채우기 및 이벤트 등록
        function populateDongFilter(data) {
            const dongs = [...new Set(data.map(item => item.dong))].sort();
            const select = document.getElementById('dong-filter');
            
            dongs.forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                select.appendChild(option);
            });

            // 선택 변경 시 데이터 필터링 후 렌더링
            select.addEventListener('change', (e) => {
                const selectedDong = e.target.value;
                if (selectedDong === 'all') {
                    updateDashboard(globalData);
                } else {
                    const filteredData = globalData.filter(item => item.dong === selectedDong);
                    updateDashboard(filteredData);
                }
            });
        }

        // 대시보드 컴포넌트 일괄 업데이트
        function updateDashboard(data) {
            renderSummary(data);
            renderChart(data);
            renderTable(data);
        }

        // 1. 요약 카드 렌더링
        function renderSummary(data) {
            if (data.length === 0) {
                // 데이터가 없을 때 0으로 처리
                document.getElementById('total-count').innerText = '0';
                document.getElementById('avg-price').innerText = '0';
                document.getElementById('max-price').innerText = '0';
                document.getElementById('min-price').innerText = '0';
                return;
            }

            const totalCount = data.length;
            const prices = data.map(item => item.price);
            
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);
            const avgPrice = Math.round(prices.reduce((a, b) => a + b, 0) / totalCount);

            const formatPriceKor = (price) => {
                if (price >= 10000) {
                    const uk = Math.floor(price / 10000);
                    const man = price % 10000;
                    return man > 0 ? `${formatNumber(uk)}억 ${formatNumber(man)}` : `${formatNumber(uk)}억`;
                }
                return formatNumber(price);
            };

            document.getElementById('total-count').innerText = formatNumber(totalCount);
            document.getElementById('avg-price').innerText = formatPriceKor(avgPrice);
            document.getElementById('max-price').innerText = formatPriceKor(maxPrice);
            document.getElementById('min-price').innerText = formatPriceKor(minPrice);
        }

        // 2. 월별 평균 차트 렌더링
        function renderChart(data) {
            if (data.length === 0) {
                if (priceChartInstance) {
                    priceChartInstance.destroy();
                    priceChartInstance = null;
                }
                return;
            }

            const monthlyData = {};
            data.forEach(item => {
                if (!monthlyData[item.month]) {
                    monthlyData[item.month] = { sum: 0, count: 0 };
                }
                monthlyData[item.month].sum += item.price;
                monthlyData[item.month].count += 1;
            });

            const months = Object.keys(monthlyData).sort();
            const avgPrices = months.map(month => 
                Math.round(monthlyData[month].sum / monthlyData[month].count)
            );

            const canvas = document.getElementById('priceChart');
            const ctx = canvas.getContext('2d');
            
            // 기존 차트가 있으면 지우기 (초기화)
            if (priceChartInstance) {
                priceChartInstance.destroy();
            }

            // 무지개색 선 그라데이션
            const gradientBorder = ctx.createLinearGradient(0, 0, canvas.clientWidth || 400, 0);
            gradientBorder.addColorStop(0, '#ef4444');   // 빨강
            gradientBorder.addColorStop(0.2, '#f97316'); // 주황
            gradientBorder.addColorStop(0.4, '#eab308'); // 노랑
            gradientBorder.addColorStop(0.6, '#22c55e'); // 초록
            gradientBorder.addColorStop(0.8, '#3b82f6'); // 파랑
            gradientBorder.addColorStop(1, '#a855f7');   // 보라
            
            // 배경 그라데이션
            const gradientBg = ctx.createLinearGradient(0, 0, 0, 300);
            gradientBg.addColorStop(0, 'rgba(239, 68, 68, 0.15)'); // 빨강 계열 투명도
            gradientBg.addColorStop(1, 'rgba(168, 85, 247, 0)');   // 보라 계열 투명도

            priceChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: '평균 거래금액 (만원)',
                        data: avgPrices,
                        borderColor: gradientBorder,
                        backgroundColor: gradientBg,
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: gradientBorder,
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return formatNumber(context.raw) + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return formatNumber(value);
                                }
                            }
                        }
                    }
                }
            });
        }

        // 3. 거래 목록 테이블 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition-colors';
                
                tr.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap text-gray-600">${item.date}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-gray-600">${item.dong}</td>
                    <td class="px-4 py-3 text-gray-900 font-medium">${item.name}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right text-gray-600">${item.area}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right text-gray-600">${item.floor}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right font-semibold text-purple-600">${formatNumber(item.price)}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right text-gray-500">${item.buildYear}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
